<body><article class="example example-like"><p>For \(f(x) = e^x\text{,}\) \(f'(x) = e^x\text{,}\) and so the tangent line approximation is,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
e^x \amp \approx e^0 + e^0 x\\
\amp = 1 + x
\end{align*}
</div>
<p class="continuation">Thus,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
e^x \approx 1 + x \qquad \text{for } x \approx 0
\end{equation*}
</div></article></body>
