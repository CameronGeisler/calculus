<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">5.6.12</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>

<p>If \(p(x) = a_0 + a_1 x + a_2 x^2 + \dots + a_n x^n\) is a polynomial, then the coefficients are given by,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
a_k = \frac{p^{(k)}(0)}{k!}
\end{equation*}
