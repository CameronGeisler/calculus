<span class="type">Definition</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">4.2.1</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>Broadly, a <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">relative maximum</dfn> is a point \(x = a\) such that \(f(x) \geq f(x)\) for all \(x\) near \(a\text{.}\) Similarly, a <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">relative minimum</dfn> is a point \(x = a\) such that \(f(a) \leq f(x)\) for all \(x\) near \(a\text{.}\)</p></article><span class="incontext"><a href="section-LEOF.html#definition-8">in-context</a></span>
