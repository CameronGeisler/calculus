<div class="para">Broadly, a <dfn class="terminology">relative maximum</dfn> is a point <span class="process-math">\(x = a\)</span> such that <span class="process-math">\(f(a) \geq f(x)\)</span> for all <span class="process-math">\(x\)</span> near <span class="process-math">\(a\text{.}\)</span> Similarly, a <dfn class="terminology">relative minimum</dfn> is a point <span class="process-math">\(x = a\)</span> such that <span class="process-math">\(f(a) \leq f(x)\)</span> for all <span class="process-math">\(x\)</span> near <span class="process-math">\(a\text{.}\)</span>
