<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>If \(f(x) = x^r\) for some \(r \in \mathbb{R}\text{,}\) then \(f'(x) = rx^{r-1}\text{.}\) In other words,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\frac{d}{dx} x^r = rx^{r-1}}
\end{equation*}
</div>
