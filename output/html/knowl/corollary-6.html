<article class="corollary theorem-like"><h4 class="heading">
<span class="type">Corollary</span><span class="space"> </span><span class="codenumber">5.6.10</span><span class="period">.</span>
</h4>
<div class="para logical">
<div class="para">If the <span class="process-math">\((n+1)\)</span>-st derivative of <span class="process-math">\(f\)</span> is bounded, say <span class="process-math">\(\abs{f^{(n+1)}(t)} \leq M\)</span> for all <span class="process-math">\(t\)</span> between <span class="process-math">\(x\)</span> and <span class="process-math">\(a\text{,}\)</span> then by Taylor's theorem,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{E_n(x) \leq \frac{M}{(n + 1)!}(x - a)^{n+1}}
\end{equation*}
</div>
