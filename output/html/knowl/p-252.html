<p>In this way, determining possible extrema involves solving the equation \(f'(x) = 0\text{.}\) Note that the converse of Fermat's theorem is false, in that it is possible for \(f'(a) = 0\text{,}\) but \(f\) does not have a local extremum at \(x = a\text{.}\)</p>
