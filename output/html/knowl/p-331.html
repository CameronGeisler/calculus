<h4 class="heading"><span class="type">Paragraph</span></h4>
<div class="para">The MVT is the “slanted” version of Rolle's theorem (conversely, Rolle's theorem is the “horizontal” version of the MVT). If <span class="process-math">\(f(a) = f(b)\)</span> in the MVT, the conclusion states that <span class="process-math">\(f'(c) = 0\)</span> for some <span class="process-math">\(c \in (a,b)\text{,}\)</span> which is precisely Rolle's theorem.</div>
