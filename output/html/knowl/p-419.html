<div class="para">Let <span class="process-math">\(p(x) = a_0 + a_1 x + a_2 x^2 + \dots + a_n x^n\)</span> be a polynomial. Then, for any <span class="process-math">\(a \in \mathbb{R}\text{,}\)</span> <span class="process-math">\(p\)</span> can be written in the form,</div>
<div class="displaymath process-math">
\begin{equation*}
p(x) = c_0 + c_1 (x - a) + c_2 (x - a)^2 + \dots + c_n (x - a)^n = \sum_{k=0}^n c_k (x - a)^n
\end{equation*}
</div>
