<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
f'(x) \amp = \lim_{h \to 0} \frac{m(x + h) + b - (mx + b)}{h}\\
\amp = \lim_{h \to 0} \frac{mh}{h}\\
\amp = \lim_{h \to 0} m\\
\amp = m
\end{align*}
</div>
<p>Again, here, the difference quotient simplifies to \(m\text{,}\) because the slope does not depend on \(h\text{.}\)</p></article><span class="incontext"><a href="section-TLSOF.html#proof-2">in-context</a></span>
