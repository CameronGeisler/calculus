<p>The first form intuitively says that on an interval \([a,b]\text{,}\) there exists some point \(c \in (a,b)\) such that the slope of the tangent line of \(f\) at \(x = c\) is equal to the slope of the secant line from \((a,f(a))\) to \((b,f(b))\text{.}\)</p>
