<body><article class="hiddenproof"><p>Since \(\csc{x} = \frac{1}{\sin{x}}\text{,}\) by the reciprocal rule,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
f'(x) \amp = \frac{d}{dx} \frac{1}{\sin{x}}\\
\amp = -\frac{\cos{x}}{(\sin{x})^2}\\
\amp = -\frac{1}{\sin{x}} \cdot \frac{\cos{x}}{\sin{x}}\\
\amp = -\csc{x} \cot{x}
\end{align*}
</div></article></body>
