<article class="example example-like"><h3 class="heading">
<span class="type">Example</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">6.3.1</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Linear function.</span>
</h3>
<p>Recall that for a linear function, say \(f(x) = 3x + 2\text{,}\) its inverse function is given by \(f^{-1}(x) = \frac{1}{3}x - \frac{2}{3}\text{.}\) Notice that the slope of the inverse function is the reciprocal of the slope of the original function.</p></article><span class="incontext"><a href="section-DOIF.html#example-33">in-context</a></span>
