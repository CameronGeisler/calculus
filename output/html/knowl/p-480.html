<h3 class="heading"><span class="type">Paragraph</span></h3>
<p>Recall that graphically, an inverse function is the functions reflection over the line \(y = x\text{.}\) Then, it seems intuitive that the slopes of the tangent lines of \(y = f^{-1}(x)\) can be written in terms of the slopes of \(y = f(x)\text{.}\)</p>
