<h4 class="heading"><span class="type">Paragraph</span></h4>
<p>Consider a curve \(C\) that is the graph of \(y = f(x)\) where \(f\) is a continuous function, and is intuitively “smooth”. Then, let \(P = (x_0, y_0)\) be a point on the graph so that \(y_0 = f(x_0)\text{,}\) and assume that \(P\) is not an endpoint of the graph.</p>
