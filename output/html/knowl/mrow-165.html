\begin{align*}
f'(x) \amp = \frac{d}{dx} \frac{\cos{x}}{\sin{x}}\\
\amp = \frac{\sin{x}(-\sin{x}) - \cos{x}(\cos{x})}{(\sin{x})^2}\\
\amp = -\frac{\sin^2{x} + \cos^2{x}}{\sin^2{x}}\\
\amp = -\frac{1}{\sin^2{x}} \amp\amp \text{by the Pythagorean identity}\\
\amp = -\csc^2{x}
\end{align*}
