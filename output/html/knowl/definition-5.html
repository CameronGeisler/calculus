<span class="type">Definition</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">2.3.4</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>Let \(y = f(x)\text{.}\) Then, the derivative,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\eval{\frac{dy}{dx}}_{x=x_0} = f'(x_0)
\end{equation*}
</div>
<p class="continuation">represents the <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">instantaneous rate of change</dfn> of \(y\) with respect to \(x\) at the point \(x_0\text{.}\)</p></article><span class="incontext"><a href="section-VAROC.html#definition-5">in-context</a></span>
