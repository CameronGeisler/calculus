<div class="para">Notice that the derivative of a polynomial of degree <span class="process-math">\(n\)</span> is a polynomial of degree <span class="process-math">\(n-1\text{.}\)</span> For example, the derivative of a cubic polynomial is quadratic, and the derivative of a quadratic polynomial is linear.</div>
