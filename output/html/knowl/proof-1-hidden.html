\begin{align*}
f'(x) \amp = \lim_{h \to 0} \frac{f(x + h) - f(x)}{h} \amp\amp \text{by definition of derivative}\\
\amp = \lim_{h \to 0} \frac{k - k}{h} \amp\amp \text{as $f(x + k) = f(x) = k$}\\
\amp = \lim_{h \to 0} \frac{0}{h}\\
\amp = \lim_{h \to 0} 0\\
\amp = 0
\end{align*}
