<article class="hiddenproof"><h4 class="heading"><span class="type">Proof</span></h4>
<div class="para">Since <span class="process-math">\(\csc{x} = \frac{1}{\sin{x}}\text{,}\)</span> by the reciprocal rule,</div>
<div class="displaymath process-math">
\begin{align*}
f'(x) \amp = \frac{d}{dx} \frac{1}{\sin{x}}\\
\amp = -\frac{\cos{x}}{(\sin{x})^2}\\
\amp = -\frac{1}{\sin{x}} \cdot \frac{\cos{x}}{\sin{x}}\\
\amp = -\csc{x} \cot{x}
\end{align*}
</div></article><span class="incontext"><a href="section-DOTF.html#proof-16" class="internal">in-context</a></span>
