<p>For \(n = 0\text{,}\) Taylor's theorem is,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
f(x) = f(a) + f'(c)(x - a)
\end{equation*}
</div>
<p class="continuation">for some \(c\) between \(a\) and \(x\text{.}\) This is just the MVT.</p></article><span class="incontext"><a href="section-TTPA.html#proof-7">in-context</a></span>
