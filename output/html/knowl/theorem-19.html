<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">4.4.5</span><span class="period">.</span><span class="space"> </span><span class="title">Snell's law.</span>
</h4>
<div class="para">Let <span class="process-math">\(v_1, v_2\)</span> be the velocities of light in the two mediums, and let <span class="process-math">\(\theta_1, \theta_2\)</span> are the angles between the incident ray and the perpendicular. Then,</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{\sin{\theta_1}}{\sin{\theta_2}} = \frac{v_1}{v_2}
\end{equation*}
</div></article><span class="incontext"><a href="section-O.html#theorem-19" class="internal">in-context</a></span>
