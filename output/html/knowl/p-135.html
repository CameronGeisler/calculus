<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Let \(y = f(x)\text{.}\) The <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">average rate of change</dfn> of \(y\) with respect to \(x\) over the interval \([x_0, x_0 + \Delta x]\text{,}\) is,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\frac{\Delta y}{\Delta x} = \frac{f(x_0 + \Delta x) - f(x_0)}{\Delta x}
\end{equation*}
</div>
