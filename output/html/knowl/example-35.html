<span class="type">Example</span><span class="space"> </span><span class="codenumber">6.3.1</span><span class="period">.</span><span class="space"> </span><span class="title">Linear function.</span>
</h3> <div class="para">Recall that for a linear function, say <span class="process-math">\(f(x) = 3x + 2\text{,}\)</span> its inverse function is given by <span class="process-math">\(f^{-1}(x) = \frac{1}{3}x - \frac{2}{3}\text{.}\)</span> Notice that the slope of the inverse function is the reciprocal of the slope of the original function.</div></article><span class="incontext"><a href="section-DOIF.html#example-35" class="internal">in-context</a></span>
