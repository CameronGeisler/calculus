<h4 class="heading"><span class="type">Paragraph</span></h4>
<p>Consider a quadratic function \(f(x) = ax^2 + bx + c\text{.}\) You might recall from pre-calculus that the vertex of this parabola is \(\brac{-\frac{b}{2a}, f\brac{-\frac{b}{2a}}}\text{.}\) This is made clear using calculus.</p>
