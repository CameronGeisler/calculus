<div class="para">Let <span class="process-math">\(y = f(x)\text{.}\)</span> Then, a <dfn class="terminology">differential of x</dfn>, <span class="process-math">\(dx\text{,}\)</span> is given by <span class="process-math">\(\,dx = \Delta x\text{,}\)</span> and <span class="process-math">\(dy\)</span> is the <dfn class="terminology">differential of y</dfn>, given by <span class="process-math">\(\,dy = f'(x) \,dx\text{.}\)</span>
