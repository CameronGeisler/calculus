<h4 class="heading"><span class="type">Paragraph</span></h4>
<p>The MVT is the “slanted” version of Rolle's theorem (conversely, Rolle's theorem is the “horizontal” version of the MVT). If \(f(a) = f(b)\) in the MVT, the conclusion states that \(f'(c) = 0\) for some \(c \in (a,b)\text{,}\) which is precisely Rolle's theorem.</p>
