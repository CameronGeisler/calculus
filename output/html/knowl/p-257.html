<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Let \(f\) be differentiable at \(x = a\text{.}\) Then, if \(f(a)\) is a local extremum, then \(f'(a) = 0\text{.}\) Equivalently, if \(f'(a) \neq 0\text{,}\) then \(f(a)\) is not a local extremum of \(f\text{.}\)</p>
