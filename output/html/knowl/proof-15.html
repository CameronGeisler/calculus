<article class="hiddenproof"><h4 class="heading"><span class="type">Proof</span></h4>
<div class="para">Since <span class="process-math">\(\sec{x} = \frac{1}{\cos{x}}\text{,}\)</span> then by the reciprocal rule,</div>
<div class="displaymath process-math">
\begin{align*}
f'(x) \amp = \frac{d}{dx} \frac{1}{\cos{x}}\\
\amp = -\frac{-\sin{x}}{(\cos{x})^2}\\
\amp = \frac{1}{\cos{x}} \cdot \frac{\sin{x}}{\cos{x}}\\
\amp = \sec{x} \tan{x}
\end{align*}
</div></article><span class="incontext"><a href="section-DOTF.html#proof-15" class="internal">in-context</a></span>
