<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">3.1.1</span><span class="period">.</span><span class="space"> </span><span class="title">Power rule for derivatives.</span>
</h4>
<div class="para logical">
<div class="para">If <span class="process-math">\(f(x) = x^r\)</span> for some <span class="process-math">\(r \in \mathbb{R}\text{,}\)</span> then <span class="process-math">\(f'(x) = rx^{r-1}\text{.}\)</span> In other words,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{\frac{d}{dx} x^r = rx^{r-1}}
\end{equation*}
</div>
