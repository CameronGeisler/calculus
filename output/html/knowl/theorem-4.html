<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">3.1.1</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Power rule for derivatives.</span>
</h4>
<p>If \(f(x) = x^r\) for some \(r \in \mathbb{R}\text{,}\) then \(f'(x) = rx^{r-1}\text{.}\) In other words,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\frac{d}{dx} x^r = rx^{r-1}}
\end{equation*}
</div></article><span class="incontext"><a href="section-BDR.html#theorem-4">in-context</a></span>
