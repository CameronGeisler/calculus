<div class="para">If a function <span class="process-math">\(f\)</span> is continuous at <span class="process-math">\(x\text{,}\)</span> it may or may not be differentiable at <span class="process-math">\(x\text{.}\)</span> For example, <span class="process-math">\(f(x) = \abs{x}\)</span> is continuous but not differentiable at <span class="process-math">\(x = 0\text{.}\)</span> However, the converse is true, in that differentiability implies continuity.</div>
