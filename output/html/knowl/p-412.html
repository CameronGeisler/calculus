<div class="para">Note that sometimes, <span class="process-math">\(T_n\)</span> is called the <span class="process-math">\(n\)</span>th degree Taylor polynomial, however <span class="process-math">\(T_n\)</span> may have degree lower than <span class="process-math">\(n\)</span> if <span class="process-math">\(f^{(n)}(a) = 0\text{,}\)</span> etc. Taylor polynomials are named after <dfn class="terminology">Brook Taylor</dfn> (1685-1731).</div>
