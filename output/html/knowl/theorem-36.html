<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">6.1.10</span><span class="period">.</span><span class="space"> </span><span class="title">Derivatives of sine.</span>
</h4>
<div class="displaymath process-math">
\begin{equation*}
\frac{d^n}{dx^n} \sin{x} = \begin{cases} \sin{x} \amp n = 0, 4, 8, \dots \\
\cos{x} \amp n = 1, 5, 9, \dots \\
-\sin{x} \amp n = 2, 6, 10, \dots \\
-\cos{x} \amp n = 3, 7, 11, \dots \end{cases}
\end{equation*}
