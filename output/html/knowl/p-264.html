<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Let \(f\) be a function, continuous on \([a,b]\text{.}\) Then, \(f\) has both an absolute maximum and absolute minimum on \([a,b]\text{.}\) More explicitly, there exists \(c_1, c_2 \in [a,b]\) such that \(f(c_1) \leq f(x) \leq f(c_2)\) for all \(x \in [a,b]\text{.}\)</p>
