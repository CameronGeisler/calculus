<body><article class="example example-like">Show that \(e^x &gt; 1 + x\) for \(x &gt; 0\text{.}\) Then, from that, show that \(e^x &gt; 1 + x + \frac{x^2}{2}\) for \(x &gt; 0\text{.}\) By induction, show that \(e^x &gt; 1 + x + \frac{x^2}{2} + \dots + \frac{x^n}{n!}\) for \(x &gt; 0\text{,}\) for any \(n\text{.}\)</article></body>
