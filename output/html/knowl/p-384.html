<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>If the \((n+1)\)-st derivative of \(f\) is bounded, say \(\abs{f^{(n+1)}(t)} \leq M\) for all \(t\) between \(x\) and \(a\text{,}\) then by Taylor's theorem,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{E_n(x) \leq \frac{M}{(n + 1)!}(x - a)^{n+1}}
\end{equation*}
</div>
