<div class="para">Also, notice that if <span class="process-math">\(f\)</span> is always increasing, i.e. <span class="process-math">\(f'(x) &gt; 0\)</span> for all <span class="process-math">\(x\text{,}\)</span> then <span class="process-math">\((f^{-1})'(x) = \frac{1}{f'(f^{-1}(x))} &gt; 0\)</span> for all <span class="process-math">\(x\)</span> also. Thus, <span class="process-math">\(f^{-1}\)</span> is increasing.</div>
