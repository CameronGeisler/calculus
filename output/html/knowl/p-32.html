<p>Intuitively, if we make make \(h\) “infinitely” small, then the two points used to measure the slope become “infinitely close” together. Then, the slope of the secant line becomes <em xmlns:svg="http://www.w3.org/2000/svg" class="emphasis">exactly</em> equal to the slope of the tangent line.</p>
