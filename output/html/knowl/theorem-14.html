<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">4.2.3</span><span class="period">.</span><span class="space"> </span><span class="title">Fermat's theorem.</span>
</h4>
<div class="para">Let <span class="process-math">\(f\)</span> be differentiable at <span class="process-math">\(x = a\text{.}\)</span> Then, if <span class="process-math">\(f(a)\)</span> is a local extremum, then <span class="process-math">\(f'(a) = 0\text{.}\)</span> Equivalently, if <span class="process-math">\(f'(a) \neq 0\text{,}\)</span> then <span class="process-math">\(f(a)\)</span> is not a local extremum of <span class="process-math">\(f\text{.}\)</span>
</div></article><span class="incontext"><a href="section-LEOF.html#theorem-14" class="internal">in-context</a></span>
