<span class="type">Example</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">4.1.5</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>Consider the cubic function \(f(x) = x^3 + 4x + 7\text{.}\) We know that some cubic functions are one-to-one, but some have 2 turning points and are not one-to-one. In this case, \(f'(x) = 3x^2 + 4 &gt; 0\) for all \(x\text{,}\) so \(f\) is one-to-one.</p></article><span class="incontext"><a href="section-IADF.html#example-13">in-context</a></span>
