<div class="para logical">
<div class="para">Let <span class="process-math">\(y = f(x)\text{.}\)</span> The <dfn class="terminology">average rate of change</dfn> of <span class="process-math">\(y\)</span> with respect to <span class="process-math">\(x\)</span> over the interval <span class="process-math">\([x_0, x_0 + \Delta x]\text{,}\)</span> is,</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{\Delta y}{\Delta x} = \frac{f(x_0 + \Delta x) - f(x_0)}{\Delta x}
\end{equation*}
