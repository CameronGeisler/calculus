<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">2.3.3</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>Let \(y = f(x)\text{.}\) The <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">average rate of change</dfn> of \(y\) with respect to \(x\) over the interval \([x_0, x_0 + \Delta x]\text{,}\) is,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\frac{\Delta y}{\Delta x} = \frac{f(x_0 + \Delta x) - f(x_0)}{\Delta x}
\end{equation*}
</div></article><span class="incontext"><a href="section-VAROC.html#definition-4">in-context</a></span>
