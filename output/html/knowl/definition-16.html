<div class="para logical">
<div class="para">Let <span class="process-math">\(y = y(t)\)</span> represent a quantity over time. Then, the <dfn class="terminology">relative rate of change</dfn> of <span class="process-math">\(y\)</span> is given by,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{\text{RRC} = \frac{y'(t)}{y(t)}}
\end{equation*}
