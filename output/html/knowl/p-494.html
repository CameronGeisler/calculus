<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>If \(f\) is increasing on an interval $I$, then its inverse \(f^{-1}\) is increasing on the corresponding interval. Similarly, if \(f\) is decreasing, then \(f^{-1}\) is decreasing.</p>
