<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Consider the cubic function \(f(x) = x^3 + 4x + 7\text{.}\) We know that some cubic functions are one-to-one, but some have 2 turning points and are not one-to-one. In this case, \(f'(x) = 3x^2 + 4 &gt; 0\) for all \(x\text{,}\) so \(f\) is one-to-one.</p>
