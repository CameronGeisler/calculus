<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">2.3.2</span><span class="period">.</span><span class="space"> </span><span class="title">Velocity is the derivative of position.</span>
</h4>
<div class="para">For an object with position given (in 1 dimension) given by <span class="process-math">\(x(t)\text{,}\)</span> its velocity <span class="process-math">\(v(t)\)</span> is given by the derivative of <span class="process-math">\(x(t)\text{.}\)</span> In other words,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{v(t) = x'(t) = \frac{dx}{dt}}
\end{equation*}
</div></article><span class="incontext"><a href="section-VAROC.html#theorem-3" class="internal">in-context</a></span>
