<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">4.3.2</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>Let \(f\) be a function, continuous on \([a,b]\text{.}\) Then, \(f\) has both an absolute maximum and absolute minimum on \([a,b]\text{.}\) More explicitly, there exists \(c_1, c_2 \in [a,b]\) such that \(f(c_1) \leq f(x) \leq f(c_2)\) for all \(x \in [a,b]\text{.}\)</p></article><span class="incontext"><a href="section-AEOF.html#theorem-16">in-context</a></span>
