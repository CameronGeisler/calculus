<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Let \(y = y(t)\) represent a quantity over time. Then, the <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">relative rate of change</dfn> of \(y\) is given by,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\text{RRC} = \frac{y'(t)}{y(t)}}
\end{equation*}
</div>
