<div class="para">Determining concavity, <span class="process-math">\(f''(x) = 2a\)</span> which is constant. If <span class="process-math">\(a &gt; 0\text{,}\)</span> then <span class="process-math">\(f''(x) &gt; 0\)</span> for all <span class="process-math">\(x\text{,}\)</span> and <span class="process-math">\(f\)</span> is concave up. If <span class="process-math">\(a \lt 0\text{,}\)</span> then <span class="process-math">\(f'' \lt 0\text{,}\)</span> and <span class="process-math">\(f\)</span> is concave down.</div>
