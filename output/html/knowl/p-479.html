<h3 class="heading"><span class="type">Paragraph</span></h3>
<p>There are many functions in mathematics which have useful inverses. For example, exponential functions have inverses of logarithmic functions, and trigonometric functions have their inverse trigonometric functions (\(\arcsin{x}, \arccos{x}, \arctan{x}\)).</p>
