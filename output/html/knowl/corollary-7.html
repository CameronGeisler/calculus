<span class="type">Corollary</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">6.3.3</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span>
</h4>
<p>If \(f\) is increasing on an interval $I$, then its inverse \(f^{-1}\) is increasing on the corresponding interval. Similarly, if \(f\) is decreasing, then \(f^{-1}\) is decreasing.</p></article><span class="incontext"><a href="section-DOIF.html#corollary-7">in-context</a></span>
