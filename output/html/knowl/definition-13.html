<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">5.1.3</span><span class="period">.</span>
</h4>
<div class="para">Let <span class="process-math">\(f\)</span> be differentiable at <span class="process-math">\(x = a\text{.}\)</span> Then, the <dfn class="terminology">linearization</dfn> (or <dfn class="terminology">linear approximation</dfn>) of <span class="process-math">\(f\)</span> at <span class="process-math">\(x = a\)</span> is the function,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{L(x) = f(a) + f'(a)(x - a)}
\end{equation*}
</div></article><span class="incontext"><a href="section-DLLA.html#definition-13" class="internal">in-context</a></span>
