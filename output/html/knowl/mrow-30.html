\begin{align*}
f'(x) \amp = \lim_{h \to 0} \frac{f(x + h) - f(x)}{h}\\
\amp = \lim_{h \to 0} \frac{(x + h)^2 - x^2}{h}\\
\amp = \lim_{h \to 0} \frac{(x^2 + 2xh + h^2) - x^2}{h}\\
\amp = \lim_{h \to 0} \frac{2xh + h^2}{h}\\
\amp = \lim_{h \to 0} (2x + h)\\
f'(x) \amp = 2x
\end{align*}
