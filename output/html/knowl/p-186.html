<div class="para">Let <span class="process-math">\(f, g\)</span> be functions, differentiable at <span class="process-math">\(x\)</span> and <span class="process-math">\(g(x) \neq 0\text{.}\)</span> Then, the quotient <span class="process-math">\(f/g\)</span> is differentiable at <span class="process-math">\(x\text{,}\)</span> and,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{\brac{\frac{f}{g}}'(x) = \frac{f'(x)g(x) - f(x)g'(x)}{(g(x))^2}}
\end{equation*}
</div>
