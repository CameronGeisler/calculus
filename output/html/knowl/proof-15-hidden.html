<body><article class="hiddenproof"><p>Since \(\sec{x} = \frac{1}{\cos{x}}\text{,}\) then by the reciprocal rule,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
f'(x) \amp = \frac{d}{dx} \frac{1}{\cos{x}}\\
\amp = -\frac{-\sin{x}}{(\cos{x})^2}\\
\amp = \frac{1}{\cos{x}} \cdot \frac{\sin{x}}{\cos{x}}\\
\amp = \sec{x} \tan{x}
\end{align*}
</div></article></body>
