<body><article class="hiddenproof"><p>Let \(f(x) = \cos{x}\text{.}\) Then,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
f'(x) \amp = \frac{d}{dx} \cos{x}\\
\amp = \frac{d}{dx} \sin{\brac{\frac{\pi}{2} - x}}\\
\amp = (-1) \cos{\brac{\frac{\pi}{2} - x}} \amp\amp \text{by the chain rule}\\
\amp = -\sin{x}
\end{align*}
</div></article></body>
