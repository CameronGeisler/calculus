<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">6.1.2</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Derivative of cosine is negative of sine.</span>
</h4>
<p>Let \(f(x) = \cos{x}\text{.}\) Then, \(f'(x) = -\sin{x}\text{.}\) In other words,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\frac{d}{dx} \cos{x} = -\sin{x}}
\end{equation*}
</div></article><span class="incontext"><a href="section-DOTF.html#theorem-29">in-context</a></span>
