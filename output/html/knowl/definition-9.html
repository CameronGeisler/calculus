<span class="type">Definition</span><span class="space"> </span><span class="codenumber">4.2.2</span><span class="period">.</span>
</h4>
<div class="para">Let <span class="process-math">\(f\)</span> be defined at <span class="process-math">\(x = a\text{.}\)</span> Then, <span class="process-math">\(a\)</span> is a <dfn class="terminology">critical point</dfn> of <span class="process-math">\(f\)</span> if either <span class="process-math">\(f'(a) = 0\)</span> or <span class="process-math">\(f'(a)\)</span> does not exist (<span class="process-math">\(f\)</span> is not differentiable at <span class="process-math">\(x = a\)</span>).</div></article><span class="incontext"><a href="section-LEOF.html#definition-9" class="internal">in-context</a></span>
