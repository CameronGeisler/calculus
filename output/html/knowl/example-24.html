<p>For \(f(x) = \cos{x}\text{,}\) \(f'(x) = -\sin{x}\text{,}\) and so the tangent line approximation is,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{align*}
\cos{x} \amp \approx \cos{0} - \sin{0} x\\
\amp = 1
\end{align*}
