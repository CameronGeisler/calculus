<article class="corollary theorem-like"><h4 class="heading">
<span class="type">Corollary</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">3.6.3</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Generalized power rule.</span>
</h4>
<p>If \(u = u(x)\) is differentiable, then,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\boxed{\frac{d}{dx}(u(x))^n = n(u(x))^{n-1} u'(x)} \qquad \text{or} \qquad \boxed{\frac{d}{dx} u^n = n u^{n-1} \frac{du}{dx}}
\end{equation*}
</div></article><span class="incontext"><a href="section-TCR.html#corollary-4">in-context</a></span>
