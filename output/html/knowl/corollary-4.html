<span class="type">Corollary</span><span class="space"> </span><span class="codenumber">3.6.3</span><span class="period">.</span><span class="space"> </span><span class="title">Generalized power rule.</span>

<div class="para logical">
<div class="para">If <span class="process-math">\(u = u(x)\)</span> is differentiable, then,</div>
<div class="displaymath process-math">
\begin{equation*}
\boxed{\frac{d}{dx}(u(x))^n = n(u(x))^{n-1} u'(x)} \qquad \text{or} \qquad \boxed{\frac{d}{dx} u^n = n u^{n-1} \frac{du}{dx}}
\end{equation*}
