<h5 class="heading"><span class="type">Paragraph</span></h5>
<p>Let \(p(x) = a_0 + a_1 x + a_2 x^2 + \dots + a_n x^n\) be a polynomial. Then, for any \(a \in \mathbb{R}\text{,}\) \(p\) can be written in the form,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
p(x) = c_0 + c_1 (x - a) + c_2 (x - a)^2 + \dots + c_n (x - a)^n = \sum_{k=0}^n c_k (x - a)^n
\end{equation*}
</div>
