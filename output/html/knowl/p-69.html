<p>Then, the <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">tangent line to \(f\) at \(a\)</dfn> is the line with slope \(m\) and that passes through the point \((x_0, f(x_0))\text{.}\) We also say that the line is <dfn xmlns:svg="http://www.w3.org/2000/svg" class="terminology">tangent</dfn> to \(f\) at \(x_0\text{.}\)</p>
