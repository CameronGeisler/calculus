<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="codenumber">4.4.2</span><span xmlns:svg="http://www.w3.org/2000/svg" class="period">.</span><span xmlns:svg="http://www.w3.org/2000/svg" class="space"> </span><span class="title">Snell's law.</span>
</h4>
<p>Let \(v_1, v_2\) be the velocities of light in the two mediums, and let \(\theta_1, \theta_2\) are the angles between the incident ray and the perpendicular. Then,</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\frac{\sin{\theta_1}}{\sin{\theta_2}} = \frac{v_1}{v_2}
\end{equation*}
</div></article><span class="incontext"><a href="section-O.html#theorem-18">in-context</a></span>
