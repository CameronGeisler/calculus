<body class="ignore-math"><article class="example example-like"><div class="para">Consider the cubic function <span class="process-math">\(f(x) = x^3 + 4x + 7\text{.}\)</span> We know that some cubic functions are one-to-one, but some have 2 turning points and are not one-to-one. In this case, <span class="process-math">\(f'(x) = 3x^2 + 4 &gt; 0\)</span> for all <span class="process-math">\(x\text{,}\)</span> so <span class="process-math">\(f\)</span> is one-to-one.</div></article></body>
