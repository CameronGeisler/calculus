</h5>From the right, as \(h \to 0+\text{,}\) \(\abs{h} = h\text{,}\) and so,<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
\lim_{h \to 0+} \frac{\abs{h}}{h} = \lim_{h \to 0} \frac{h}{h} = \lim_{h \to 0} 1 = 1
\end{equation*}
</div>Thus, from the right, the slopes approach 1 (this can be confirmed graphically).</article><span class="incontext"><a href="section-D.html#li-34">in-context</a></span>
