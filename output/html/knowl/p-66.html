<div class="para">An expression of the form <span class="process-math">\(\frac{0}{0}\)</span> is called an <dfn class="terminology">indeterminate form</dfn>. However, we can still consider the behavior of this expression as <span class="process-math">\(h \to 0\text{.}\)</span> In calculus, we <em class="emphasis">define</em> the slope of the graph as the limit of the slope of the secant line, as <span class="process-math">\(h \to 0\text{.}\)</span>
